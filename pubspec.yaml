name: brahmakosh
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+6

environment:
  sdk: ^3.10.0-290.1.beta


dependencies:
  flutter:
    sdk: flutter

 
  cupertino_icons: ^1.0.8
  

  provider: ^6.1.1
  flutter_webrtc: ^1.2.1
  permission_handler: ^12.0.1
  get: ^4.6.6
  lottie: ^3.3.2
  webview_flutter: ^4.13.0
  fluttertoast: ^9.0.0
